    name: 'Hidden Dwarven or Elven Weapon'
    description: 'Hidden dwarven or elven weapon. Roll on the Weapons subtable for the base weapon type, then name it and imbue it with a wise per the rules on p.155-156. Typically a monster-wise (Orc-wise, Giant-wise, Spider-wise) though creative smiths have been known to instill Moon-wise, Gold-wise or Truth-wise. The weapon confers this wise when held, and it does not count against the wielder''s maximum number of wises. If the wise names a creature or individual, those so named cannot wield the weapon (they drop it with a yelp of pain).'

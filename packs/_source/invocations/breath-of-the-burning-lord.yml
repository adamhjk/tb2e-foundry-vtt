system:
  description: "<p>Exhaling the breath of life upon their allies, the Immortals suffuse them with sustaining warmth.</p><p><strong>Effect:</strong> The effect of this invocation covers the entire adventuring party. While under the effects, the theurge and their allies may ignore factors involving cold and chill and are granted +1D to Health tests to recover from exhausted, injured and sick. The invocation also grants targets +1D to Health tests during journeys. In addition, monsters using cold-based weapons suffer -1D to Attack against characters under the effect of this invocation.</p>"

  description: "<p>The Lords of Life and Death channel their white-hot fury at the perversion of their order. They tear aside the Veil of Reality to force the undead to comprehend the mockery that is their existence.</p><p><strong>Effect:</strong> This invocation causes any undead who can see the theurge to flee their presence. Targets must have somewhere to flee. If backed into a corner or attacked as they flee, they turn and violently attack the theurge. The effect lasts for two turns. This invocation affects only creatures of the undead type.</p>"

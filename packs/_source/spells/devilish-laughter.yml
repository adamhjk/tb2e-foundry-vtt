name: Devilish Laughter
type: spell
img: icons/magic/light/orb-lightning-blue.webp
system:
  description: "<p>The magician offers to tell the greatest joke ever heard. Speaking an incantation between teeth locked in a toothy smile, the caster causes victims to be seized with horrible, uncontrollable laughter.</p><p>This spell affects troll and folk type creatures who can hear the caster. All targets who fail to resist rapidly descend into uncontrollable, wheezing guffaws, replete with streaming tears and bulging eyes.</p><p>The horrible laughter incapacitates the targets for one turn, plus one turn per margin of success. For each turn spent laughing after the first, the victim suffers one condition as per the grind.</p><p>Be careful; you can laugh yourself to death.</p>"

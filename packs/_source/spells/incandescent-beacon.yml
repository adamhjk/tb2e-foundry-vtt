system:
  description: "<p>The magician conjures a heatless flame to light the darkness.</p><p>This spell creates a light equivalent to a lantern that lasts for the remainder of the session. The spell may be cast on an area, in which case it is immobile, or it may be cast on an object, in which case it moves with that object.</p><p>The light can be covered but not extinguished. However, a Shroud of Shadows spell can cancel it, if used properly.</p>"

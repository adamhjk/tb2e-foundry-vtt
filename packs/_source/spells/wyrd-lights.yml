system:
  description: "<p>With whispered words, the magician calls forth dancing flames from the aetherial plane.</p><p>The magician summons a number of lights that dance and whirl about the head. Each wisp provides light equivalent to a candle and is unaffected by wind and weather. They can even give light when submerged in water.</p><p>With a thought, the caster may send the lights down corridors or around corners, giving the appearance of a party of adventurers carrying candles. The caster may also command each light to hover in a different place or follow a different person. The magician may choose to end the spell at any time.</p>"

name: Balefire
type: spell
img: icons/magic/light/orb-lightning-blue.webp
system:
  description: "<p>The magician gleans the residues of anger and hate from the Skein of Destiny and ignites them into an incandescent ball of aetheric energy, which they then hurl at their enemies.</p><p>This spell increases the magician's Might by one and grants +3s to the Attack action.</p><p>If Balefire reduces an opposing team below zero hit points, the excess damage is applied to the caster's team as the fire rages out of control.</p><p>Balefire sets alight all flammable material it touches: hair, clothing, flesh, scrolls, books, paper, oil, wood, etc. Such material will be consumed in one turn after impact if not doused by water, sand or other means.</p><p>Wooden doors, structures and buildings hit with Balefire will scorch, weaken or be consumed at the end of the following turn unless the fire is doused.</p>"

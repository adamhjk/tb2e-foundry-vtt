  description: "<p>With a sharp syllable uttered by the magician, invisible webs of aether, stronger than iron, bind portals and chests shut.</p><p>This spell takes existing binding materials and makes them supernaturally strong. Bonds, a door, a chest or a gate held by the Word of Binding cannot be opened by mundane means. Once bound, only the expiration of the spell, the destruction of the object or the Rhyme of Opening or Sign of Abrogation spells can break the spell.</p>"

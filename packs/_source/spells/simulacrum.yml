name: Simulacrum
type: spell
img: icons/magic/light/orb-lightning-blue.webp
system:
  description: "<p>Speaking reversed words while walking backwards in a Gemini pattern, the magician conjures true horrors: duplicates of themselves.</p><p>Successfully casting this spell conjures one or more mirror images of the caster. Each simulacrum increases by one the magician's hit points in a kill, drive off or capture conflict.</p><p>Margin of success adds additional simulacra and thus an additional hit point.</p><p>Simulacra are knocked out of a fight before any other targets--even if another character is targeted--and cannot be regained by any means.</p><p>Bonus disposition from simulacra does not count as part of the team's disposition for the purpose of determining a compromise.</p>"

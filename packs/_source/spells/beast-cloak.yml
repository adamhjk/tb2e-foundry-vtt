name: Beast Cloak
type: spell
img: icons/magic/light/orb-lightning-blue.webp
system:
  description: "<p>Whispering their own secret name in the language of spirits, the magician pulls a cloak of aether about themselves and assumes a new form.</p><p>This spell transforms the magician into a falcon, mouse, cat or eel (choose one when the spell is learned; if you have the Middarmark Gazetteer, they transform into their fylgja).</p><p>When transformed, the magician replaces their Nature descriptors with the beast's and gains a level 1 trait. The magician keeps their own mental faculties and skills, but may only perform skills of which their new form is capable.</p><p>Falcon: Seeing, Flying, Hunting. Trait: Agile (in flight).</p><p>Mouse: Hiding, Foraging, Climbing. Trait: Meek.</p><p>Cat: Pouncing, Stalking, Climbing. Trait: Sensual.</p><p>Eel: Burrowing, Escaping, Swimming. Trait: Slippery.</p>"

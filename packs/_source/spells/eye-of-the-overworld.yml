name: Eye of the Overworld
type: spell
img: icons/magic/light/orb-lightning-blue.webp
system:
  description: "<p>This spell summons a great, floating luminous eye to fly before you and spy out the way.</p><p>Roughly the size of a human head, the eye obeys telepathic commands and allows the magician to see through it. By default, the eye is visible and sheds dim light. The caster may choose to make the eye invisible when casting, though it can be seen by spells like Supernal Vision or invocations like Vision of the Lords of Chaos and Law.</p><p>The magician can project the eye into an area adjacent to their current location. It travels at the speed of thought but cannot pass through walls or other solid objects. It can, however, squeeze through gaps of at least one inch in diameter.</p><p>That said, the eye is fragile. A handful of salt, an enchanted weapon or an attacking spell or invocation will disrupt it and end the spell.</p>"

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="40%" stop-color="#f5f7fa"/>
    </linearGradient>
  </defs>
  <!-- Card body -->
  <rect x="0" y="0" width="200" height="280" rx="12" ry="12" fill="url(#bg)" stroke="#bbf7d0" stroke-width="1"/>
  <!-- Inner frame -->
  <rect x="4" y="4" width="192" height="272" rx="8" ry="8" fill="none" stroke="#bbf7d0" stroke-width="1" opacity="0.25"/>
  <!-- Watermark circle -->
  <circle cx="100" cy="130" r="40" fill="#15803d" opacity="0.06"/>
  <!-- Crossed arrows icon -->
  <g transform="translate(100,128)" fill="none" stroke="#15803d" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Arrow 1: bottom-left to top-right -->
    <line x1="-26" y1="26" x2="26" y2="-26"/>
    <polyline points="14,-26 26,-26 26,-14"/>
    <!-- Arrow 2: bottom-right to top-left -->
    <line x1="26" y1="26" x2="-26" y2="-26"/>
    <polyline points="-14,-26 -26,-26 -26,-14"/>
    <!-- Center circle -->
    <circle cx="0" cy="0" r="6" fill="#15803d" fill-opacity="0.12" stroke-width="2"/>
  </g>
  <!-- Label -->
  <text x="100" y="195" text-anchor="middle" font-family="serif" font-size="14" font-weight="600"
        fill="#15803d" letter-spacing="0.1em" style="text-transform:uppercase">MANEUVER</text>
  <!-- Top-left pip -->
  <g fill="#15803d" opacity="0.6">
    <text x="16" y="26" font-family="serif" font-size="16" font-weight="700" text-anchor="middle">M</text>
    <!-- Mini arrows -->
    <line x1="11" y1="42" x2="21" y2="32" stroke="#15803d" stroke-width="1.2" stroke-linecap="round"/>
    <polyline points="18,32 21,32 21,35" fill="none" stroke="#15803d" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="21" y1="42" x2="11" y2="32" stroke="#15803d" stroke-width="1.2" stroke-linecap="round"/>
    <polyline points="14,32 11,32 11,35" fill="none" stroke="#15803d" stroke-width="1.2" stroke-linecap="round"/>
  </g>
  <!-- Bottom-right pip (rotated) -->
  <g fill="#15803d" opacity="0.6" transform="rotate(180 100 140)">
    <text x="16" y="26" font-family="serif" font-size="16" font-weight="700" text-anchor="middle">M</text>
    <line x1="11" y1="42" x2="21" y2="32" stroke="#15803d" stroke-width="1.2" stroke-linecap="round"/>
    <polyline points="18,32 21,32 21,35" fill="none" stroke="#15803d" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="21" y1="42" x2="11" y2="32" stroke="#15803d" stroke-width="1.2" stroke-linecap="round"/>
    <polyline points="14,32 11,32 11,35" fill="none" stroke="#15803d" stroke-width="1.2" stroke-linecap="round"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a7cc9"/>
      <stop offset="100%" stop-color="#2d5fa6"/>
    </linearGradient>
    <pattern id="hatch" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="10" height="10" fill="none"/>
      <line x1="0" y1="5" x2="10" y2="5" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
    </pattern>
  </defs>
  <!-- Card body -->
  <rect x="0" y="0" width="200" height="280" rx="12" ry="12" fill="url(#bg)" stroke="#93c5fd" stroke-width="1"/>
  <!-- Inner frame -->
  <rect x="4" y="4" width="192" height="272" rx="8" ry="8" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <!-- Diamond hatch pattern -->
  <rect x="6" y="6" width="188" height="268" rx="6" ry="6" fill="url(#hatch)"/>
  <!-- Second hatch layer rotated for diamond effect -->
  <rect x="6" y="6" width="188" height="268" rx="6" ry="6" fill="url(#hatch)" transform="rotate(90 100 140)"/>
  <!-- Center medallion -->
  <circle cx="100" cy="140" r="28" fill="rgba(0,0,0,0.12)" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
  <!-- Shield emblem -->
  <path d="M100 118 L118 128 L118 148 Q118 158 100 166 Q82 158 82 148 L82 128 Z"
        fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Shield cross -->
  <line x1="100" y1="126" x2="100" y2="158" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="86" y1="140" x2="114" y2="140" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <!-- Corner torches (decorative) -->
  <circle cx="20" cy="20" r="3" fill="rgba(255,255,255,0.12)"/>
  <circle cx="180" cy="20" r="3" fill="rgba(255,255,255,0.12)"/>
  <circle cx="20" cy="260" r="3" fill="rgba(255,255,255,0.12)"/>
  <circle cx="180" cy="260" r="3" fill="rgba(255,255,255,0.12)"/>
</svg>
